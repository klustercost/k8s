# Default values for klustercost.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  appName: "klustercost"
  extraLabels: {}

# --- Private container registry ---
imageRegistry:
  enabled: false
  server: ""
  username: ""
  password: ""

postgresql:
  enabled: true
  image: postgres:17
  name: klustercost
  username: klustercost
  password: klustercost
  tls:
    enabled: false
  port: 5432
  pvc:
    enabled: false
    size: 8Gi
    storageClass: "managed-csi"
  serviceType: ClusterIP

monitor:
  image: ghcr.io/klustercost/k8s/klustercost-monitor:latest
  resyncTime: 300
  workers: 3

price:
  image: ghcr.io/klustercost/k8s/klustercost-price:latest
  provider: "azure"

update:
  image: ghcr.io/klustercost/k8s/klustercost-update:latest

prometheus:
  prometheusServerAddress: "http://prometheus-server.prometheus.svc.cluster.local"

mcp:
  enabled: true
  imagePullPolicy: Always
  # Log level for MCP components. Valid values: DEBUG | INFO
  logLevel: "INFO"

  server:
    image: ghcr.io/klustercost/k8s/klustercost-mcp-server:latest
    replicas: 1
    port: 8000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  client:
    image: ghcr.io/klustercost/k8s/klustercost-mcp-client:latest
    port: 8080
    serviceType: ClusterIP
    sessionTimeout: 3600
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  openai:
    apiKey: ""
    model: "gpt-5.4-mini"
    answerModel: "gpt-5.4-mini"

  postgresql:
    schema: "klustercost"

wafrontend:
  enabled: true
  image: ghcr.io/klustercost/k8s/klustercost-wab:latest
  port: 80
  targetPort: 5000
  serviceType: ClusterIP
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  accesstoken:
  verifytoken:
  template: "more_data"
  templateContext: ""

powerbi:
  enabled: true
  image: ghcr.io/klustercost/k8s/klustercost-patcher:latest
  configUri: https://download.microsoft.com/download/7/1/d/71d86715-5596-4529-9b13-da13a5de5b63/ServiceTags_Public_20260323.json
  extract: "$.values[?(@.name == 'PowerBI')].properties.addressPrefixes.*"
  #additionalIps: '["1.2.3.4/32","5.6.7.8/32"]'
  additionalIps: "{}"

teams:
  enabled: true
  image: ghcr.io/klustercost/k8s/klustercost-teamsb:latest
  replicas: 1
  port: 80
  targetPort: 8080
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tenantId: ""
  clientId: ""
  botType: "UserAssignedMsi"
