apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-update
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "update") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "klustercost.componentSelectorLabels" (dict "context" . "component" "update") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "klustercost.componentLabels" (dict "context" . "component" "update") | nindent 8 }}
    spec:
      {{- if .Values.imageRegistry.enabled }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-registry-secret
      {{- end }}
      containers:
        - name: klustercost-update
          image: {{ .Values.update.image }}
          env:
            - name: price_uri
              value: {{ .Release.Name }}-price.{{ .Release.Namespace }}.svc.cluster.local
            - name: host
              value: {{ .Release.Name }}-postgres-service.{{ .Release.Namespace }}.svc.cluster.local
            - name: database
              value: {{ .Values.postgresql.name }}
            - name: user
              value: {{ .Values.postgresql.username }}
            - name: password
              value: {{ .Values.postgresql.password }}
            - name: port
              value: "{{ printf "%v" .Values.postgresql.port }}"
          resources:
            limits:
              cpu: "1"
              memory: 1024Mi
            requests:
              cpu: "0.05"
              memory: 256Mi
