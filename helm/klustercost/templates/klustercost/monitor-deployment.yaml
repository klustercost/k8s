kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Release.Name }}-monitor
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "monitor") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "klustercost.componentSelectorLabels" (dict "context" . "component" "monitor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "klustercost.componentLabels" (dict "context" . "component" "monitor") | nindent 8 }}
    spec:
      {{- if .Values.imageRegistry.enabled }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-registry-secret
      {{- end }}
      containers:
        - name: {{ .Release.Name }}-monitor
          image: {{ .Values.monitor.image }}
          env:
            - name: RESYNC_TIME
              value: "{{ printf "%v" .Values.monitor.resyncTime }}"
            - name: CONTROLLER_WORKERS
              value: "{{ printf "%v" .Values.monitor.workers }}"
            - name: PG_DB_USER
              value: {{ .Values.postgresql.username }}
            - name: PG_DB_PASS
              value: {{ .Values.postgresql.password }}
            - name: PG_DB_NAME
              value: {{ .Values.postgresql.name }}
            - name: PG_DB_HOST
              value: {{ .Release.Name }}-postgres-service.{{ .Release.Namespace }}.svc.cluster.local
            - name: PG_DB_PORT
              value: "{{ printf "%v" .Values.postgresql.port }}"
            - name: PROMETHEUS_SERVER
              value: "{{ .Values.prometheus.prometheusServerAddress }}"
          resources:
            limits:
              cpu: '1'
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: klustercost
      serviceAccount: klustercost
      securityContext: {}
      schedulerName: default-scheduler
