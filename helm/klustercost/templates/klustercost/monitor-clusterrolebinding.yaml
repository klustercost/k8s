apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: klustercost
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "monitor") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: klustercost
  namespace: {{ .Release.Namespace }}
