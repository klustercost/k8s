apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-service
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "postgres") | nindent 4 }}
spec:
  selector:
    {{- include "klustercost.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 4 }}
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: {{ .Values.postgresql.serviceType }}
