apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-postgres-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "postgres") | nindent 4 }}
data:
{{- range $path, $_ := (.Files.Glob "sql/*") }}
  {{ trimPrefix "sql/" $path }}: |
    {{- tpl ($.Files.Get $path) $ | nindent 4 }}
{{ end }}
