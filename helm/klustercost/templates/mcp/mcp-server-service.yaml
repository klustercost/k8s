{{- if .Values.mcp.enabled }}
kind: Service
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-mcp-server
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "mcp-server") | nindent 4 }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.mcp.server.port }}
      targetPort: {{ .Values.mcp.server.port }}
  selector:
    {{- include "klustercost.componentSelectorLabels" (dict "context" . "component" "mcp-server") | nindent 4 }}
  type: ClusterIP
{{- end }}
