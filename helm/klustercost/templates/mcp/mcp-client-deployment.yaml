{{- if .Values.mcp.enabled }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Release.Name }}-mcp-client
  labels:
    app: {{ .Release.Name }}-mcp-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mcp-client
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mcp-client
    spec:
      {{- if .Values.imageRegistry.enabled }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-registry-secret
      {{- end }}
      containers:
        - name: mcp-client
          image: {{ .Values.mcp.client.image }}
          ports:
            - containerPort: {{ .Values.mcp.client.port }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.mcp.logLevel | quote }}
            - name: MCP_SERVER_URL
              value: http://{{ .Release.Name }}-mcp-server.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.mcp.server.port }}/mcp
            - name: MCP_CLIENT_HOST
              value: "0.0.0.0"
            - name: MCP_CLIENT_PORT
              value: {{ .Values.mcp.client.port | quote }}
          resources:
            requests:
              cpu: {{ .Values.mcp.client.resources.requests.cpu }}
              memory: {{ .Values.mcp.client.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mcp.client.resources.limits.cpu }}
              memory: {{ .Values.mcp.client.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.mcp.client.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.mcp.client.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          imagePullPolicy: {{ .Values.mcp.imagePullPolicy }}
      restartPolicy: Always
{{- end }}
