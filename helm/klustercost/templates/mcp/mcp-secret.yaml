{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mcp-secret
  labels:
    {{- include "klustercost.componentLabels" (dict "context" . "component" "mcp") | nindent 4 }}
type: Opaque
data:
  OPENAI_API_KEY: {{ .Values.mcp.openai.apiKey | b64enc | quote }}
{{- end }}
